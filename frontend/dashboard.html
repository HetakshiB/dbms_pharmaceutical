<!DOCTYPE html>
<html>

<head>

<title>PharmaFlow Dashboard</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="sidebar">

<h2>PharmaFlow</h2>

<ul>
<li>Dashboard</li>
<li>Medicines</li>
<li>Inventory</li>
<li>Billing</li>
</ul>

</div>


<div class="main">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total Medicines</h3>
<p id="totalMedicines">0</p>
</div>

<div class="card">
<h3>Total Stores</h3>
<p>10</p>
</div>

<div class="card">
<h3>Total Dealers</h3>
<p>11</p>
</div>

</div>


<h2>Medicines List</h2>

<table>

<thead>

<tr>
<th>ID</th>
<th>Name</th>
<th>Composition</th>
<th>Price</th>
</tr>

</thead>

<tbody id="medicineTable"></tbody>

</table>

</div>

<script src="js/script.js"></script>

</body>
</html>
